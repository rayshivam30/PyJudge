services:
  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://pyjudge:pyjudge@db:5432/pyjudge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      EXECUTOR_USE_DOCKER: ${EXECUTOR_USE_DOCKER:-true}
      EXECUTOR_WORKSPACE_ROOT: ${EXECUTOR_WORKSPACE_ROOT:-/tmp/pyjudge}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://pyjudge:pyjudge@db:5432/pyjudge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      EXECUTOR_USE_DOCKER: ${EXECUTOR_USE_DOCKER:-true}
      EXECUTOR_WORKSPACE_ROOT: ${EXECUTOR_WORKSPACE_ROOT:-/tmp/pyjudge}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pyjudge
      POSTGRES_USER: pyjudge
      POSTGRES_PASSWORD: pyjudge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyjudge -d pyjudge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: